# Konfigurasi build Netlify untuk myKoordinat (Next.js 16 App Router).
# Plugin resmi Next.js membuat SSR (/api/login) + Proxy/middleware (gerbang
# akses admin) berjalan otomatis sebagai Netlify Functions/Edge.

[build]
  command = "npm run build"

[build.environment]
  # Next.js 16 butuh Node 20.9+; pakai 22 (LTS) biar aman.
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
